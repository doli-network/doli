# DOLI Devnet Node - Docker Compose Configuration
# Usage: docker compose -f docker-compose.devnet.yml up -d
#
# Devnet is for local development and testing with faster block times.

services:
  doli-node:
    build:
      context: .
      dockerfile: Dockerfile
    image: doli-node:latest
    container_name: doli-devnet
    restart: unless-stopped

    environment:
      - DOLI_NETWORK=devnet
      - DOLI_LOG_LEVEL=debug
      # Uncomment and set for producer mode:
      # - DOLI_PRODUCER_KEY_FILE=/keys/producer.key

    volumes:
      - doli-devnet-data:/data
      # Optional: Mount keys directory for producer mode
      # - ./keys:/keys:ro

    ports:
      - "50303:50303"  # P2P
      - "28545:28545"  # RPC
      - "9090:9090"    # Metrics

    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 512M

    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"

volumes:
  doli-devnet-data:
    name: doli-devnet-data
