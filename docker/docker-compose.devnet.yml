# DOLI Node - Docker Compose (Devnet)
# Usage: docker compose -f docker/docker-compose.devnet.yml up -d
# For local development and testing

services:
  doli-node:
    image: ghcr.io/e-weil/doli-node:latest
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: doli-devnet-node
    restart: unless-stopped
    environment:
      - DOLI_NETWORK=devnet
      - DOLI_DATA_DIR=/data
      - DOLI_LOG_LEVEL=debug
    ports:
      - "50300:50300"   # P2P (devnet)
      - "28500:28500"   # RPC (devnet)
      - "29000:29000"   # Metrics (devnet)
    volumes:
      - doli-devnet-data:/data
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 512M
    healthcheck:
      test: ["CMD-SHELL", "curl -sf -X POST http://localhost:28500 -H 'Content-Type: application/json' -d '{\"jsonrpc\":\"2.0\",\"method\":\"getChainInfo\",\"params\":{},\"id\":1}' | grep -q result"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  doli-devnet-data:
    name: doli-devnet-data

networks:
  default:
    name: doli-devnet-network
