# DOLI Node - Docker Compose (Testnet)
# Usage: docker compose -f docker/docker-compose.testnet.yml up -d

services:
  doli-node:
    image: ghcr.io/e-weil/doli-node:latest
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: doli-testnet-node
    restart: unless-stopped
    environment:
      - DOLI_NETWORK=testnet
      - DOLI_DATA_DIR=/data
      - DOLI_LOG_LEVEL=info
    ports:
      - "40300:40300"   # P2P (testnet)
      - "18500:18500"   # RPC (testnet)
      - "19000:19000"   # Metrics (testnet)
    volumes:
      - doli-testnet-data:/data
    deploy:
      resources:
        limits:
          memory: 4G
        reservations:
          memory: 1G
    healthcheck:
      test: ["CMD-SHELL", "curl -sf -X POST http://localhost:18500 -H 'Content-Type: application/json' -d '{\"jsonrpc\":\"2.0\",\"method\":\"getChainInfo\",\"params\":{},\"id\":1}' | grep -q result"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

volumes:
  doli-testnet-data:
    name: doli-testnet-data

networks:
  default:
    name: doli-testnet-network
