# DOLI Node - Docker Compose (Testnet)
# Usage: docker compose -f docker/docker-compose.testnet.yml up -d

services:
  doli-node:
    image: ghcr.io/e-weil/doli-node:latest
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: doli-testnet-node
    restart: unless-stopped
    environment:
      - DOLI_NETWORK=testnet
      - DOLI_DATA_DIR=/data
      - DOLI_LOG_LEVEL=info
    ports:
      - "40303:40303"   # P2P (testnet)
      - "18545:18545"   # RPC (testnet)
      - "9090:9090"     # Metrics
    volumes:
      - doli-testnet-data:/data
    deploy:
      resources:
        limits:
          memory: 4G
        reservations:
          memory: 1G
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:18545/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

volumes:
  doli-testnet-data:
    name: doli-testnet-data

networks:
  default:
    name: doli-testnet-network
