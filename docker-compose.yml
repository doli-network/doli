# DOLI Node - Docker Compose Configuration
# Usage: docker compose up -d
#
# For different networks, use profiles:
#   docker compose --profile testnet up -d
#   docker compose --profile devnet up -d
#
# Or use the network-specific compose files:
#   docker compose -f docker-compose.testnet.yml up -d

services:
  # ==========================================================================
  # MAINNET NODE
  # ==========================================================================
  doli-node:
    build:
      context: .
      dockerfile: Dockerfile
    image: doli-node:latest
    container_name: doli-mainnet
    restart: unless-stopped

    environment:
      - DOLI_NETWORK=mainnet
      - DOLI_LOG_LEVEL=info
      # Uncomment and set for producer mode:
      # - DOLI_PRODUCER_KEY_FILE=/keys/producer.key

    volumes:
      # Blockchain data persistence
      - doli-mainnet-data:/data
      # Optional: Mount keys directory for producer mode
      # - ./keys:/keys:ro

    ports:
      # P2P port - required for network participation
      - "30303:30303"
      # RPC port - for wallet/explorer access
      - "8545:8545"
      # Metrics port - for monitoring
      - "9090:9090"

    # Resource limits (adjust based on your system)
    deploy:
      resources:
        limits:
          memory: 4G
        reservations:
          memory: 1G

    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "5"

  # ==========================================================================
  # TESTNET NODE (use with --profile testnet)
  # ==========================================================================
  doli-testnet:
    build:
      context: .
      dockerfile: Dockerfile
    image: doli-node:latest
    container_name: doli-testnet
    restart: unless-stopped
    profiles:
      - testnet

    environment:
      - DOLI_NETWORK=testnet
      - DOLI_LOG_LEVEL=info

    volumes:
      - doli-testnet-data:/data

    ports:
      - "40303:40303"
      - "18545:18545"
      - "19090:9090"

    deploy:
      resources:
        limits:
          memory: 4G
        reservations:
          memory: 1G

    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "5"

  # ==========================================================================
  # DEVNET NODE (use with --profile devnet)
  # ==========================================================================
  doli-devnet:
    build:
      context: .
      dockerfile: Dockerfile
    image: doli-node:latest
    container_name: doli-devnet
    restart: unless-stopped
    profiles:
      - devnet

    environment:
      - DOLI_NETWORK=devnet
      - DOLI_LOG_LEVEL=debug

    volumes:
      - doli-devnet-data:/data

    ports:
      - "50303:50303"
      - "28545:28545"
      - "29090:9090"

    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 512M

    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"

  # ==========================================================================
  # MONITORING STACK (use with --profile monitoring)
  # ==========================================================================
  prometheus:
    image: prom/prometheus:latest
    container_name: doli-prometheus
    restart: unless-stopped
    profiles:
      - monitoring

    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus

    ports:
      - "9091:9090"

    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'

  grafana:
    image: grafana/grafana:latest
    container_name: doli-grafana
    restart: unless-stopped
    profiles:
      - monitoring

    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=doli
      - GF_USERS_ALLOW_SIGN_UP=false

    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana-data:/var/lib/grafana

    ports:
      - "3000:3000"

    depends_on:
      - prometheus

volumes:
  # Persistent data volumes
  doli-mainnet-data:
    name: doli-mainnet-data
  doli-testnet-data:
    name: doli-testnet-data
  doli-devnet-data:
    name: doli-devnet-data
  prometheus-data:
    name: doli-prometheus-data
  grafana-data:
    name: doli-grafana-data

networks:
  default:
    name: doli-network
