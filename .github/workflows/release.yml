# DOLI Release Workflow
# Triggers on version tags (v*)
# Builds doli-node + doli (CLI) for 4 platforms, creates native installers, publishes GitHub Release

name: Release

on:
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always

jobs:
  # ── Linux x86_64 ──────────────────────────────────────────────
  build-linux-x64:
    name: Build Linux x86_64
    runs-on: ubuntu-latest
    env:
      TARGET: x86_64-unknown-linux-gnu
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgmp-dev libmpfr-dev librocksdb-dev libclang-dev m4 protobuf-compiler

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: x86_64-unknown-linux-gnu

      - name: Build
        run: cargo build --release --target $TARGET --package doli-node --package doli-cli

      - name: Package tarball
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          DIR="doli-${VERSION}-${TARGET}"
          mkdir -p "$DIR"
          cp "target/${TARGET}/release/doli-node" "$DIR/"
          cp "target/${TARGET}/release/doli" "$DIR/"
          cp README.md LICENSE* "$DIR/" 2>/dev/null || true
          tar -czf "${DIR}.tar.gz" "$DIR"

      - name: Build .deb
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          cargo install cargo-deb
          cargo deb -p doli-node --target $TARGET --no-build --no-strip
          DEB_FILE=$(find target/${TARGET}/debian -name '*.deb' | head -1)
          cp "$DEB_FILE" "doli-${VERSION}-${TARGET}.deb"

      - name: Build .rpm
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          cargo install cargo-generate-rpm
          cargo generate-rpm -p bins/node --target $TARGET
          RPM_FILE=$(find target/${TARGET}/generate-rpm -name '*.rpm' | head -1)
          cp "$RPM_FILE" "doli-${VERSION}-${TARGET}.rpm"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-x64
          path: |
            doli-*.tar.gz
            doli-*.deb
            doli-*.rpm

  # ── macOS aarch64 (Apple Silicon) ─────────────────────────────
  build-macos-arm64:
    name: Build macOS aarch64
    runs-on: macos-latest
    env:
      TARGET: aarch64-apple-darwin
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: brew install gmp mpfr protobuf 2>/dev/null || true

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: aarch64-apple-darwin

      - name: Build
        run: cargo build --release --target $TARGET --package doli-node --package doli-cli

      - name: Package tarball
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          DIR="doli-${VERSION}-${TARGET}"
          mkdir -p "$DIR"
          cp "target/${TARGET}/release/doli-node" "$DIR/"
          cp "target/${TARGET}/release/doli" "$DIR/"
          cp README.md LICENSE* "$DIR/" 2>/dev/null || true
          tar -czf "${DIR}.tar.gz" "$DIR"

      - name: Build .pkg
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          VERSION_NUM=${VERSION#v}
          mkdir -p pkg-root/usr/local/bin
          cp "target/${TARGET}/release/doli-node" pkg-root/usr/local/bin/
          cp "target/${TARGET}/release/doli" pkg-root/usr/local/bin/
          pkgbuild --root pkg-root \
            --identifier network.doli.node \
            --version "$VERSION_NUM" \
            --install-location / \
            "doli-${VERSION}-${TARGET}.pkg"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-arm64
          path: |
            doli-*.tar.gz
            doli-*.pkg

  # ── Create GitHub Release ─────────────────────────────────────
  release:
    name: Create Release
    needs: [build-linux-x64, build-macos-arm64]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Flatten artifacts
        run: |
          mkdir -p release
          find artifacts -type f \( -name "*.tar.gz" -o -name "*.deb" -o -name "*.rpm" -o -name "*.pkg" \) -exec mv {} release/ \;

      - name: Generate checksums
        run: |
          cd release
          sha256sum * > CHECKSUMS.txt

      - name: Create empty SIGNATURES.json scaffold
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          VERSION_NUM=${VERSION#v}
          CHECKSUMS_SHA256=$(sha256sum release/CHECKSUMS.txt | cut -d' ' -f1)
          cat > release/SIGNATURES.json <<SIGEOF
          {
            "version": "${VERSION_NUM}",
            "checksums_sha256": "${CHECKSUMS_SHA256}",
            "signatures": []
          }
          SIGEOF

      - name: Generate release notes
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")

          {
            echo "## What's Changed"
            echo ""

            if [ -n "$PREV_TAG" ]; then
              git log "${PREV_TAG}..HEAD" --pretty=format:"* %s"
            else
              git log --pretty=format:"* %s" -20
            fi

            echo ""
            echo ""
            echo "## Downloads"
            echo ""
            echo "Each archive contains both \`doli-node\` (full node) and \`doli\` (wallet CLI)."
            echo ""
            echo "| Platform | File |"
            echo "|----------|------|"

            for f in release/*.tar.gz release/*.deb release/*.rpm release/*.pkg; do
              [ -f "$f" ] && echo "| $(basename "${f%.*}" | sed "s/doli-${VERSION}-//") | $(basename "$f") |"
            done

            echo ""
            echo "## Installation"
            echo ""
            echo "**Debian / Ubuntu:**"
            echo '```bash'
            echo "sudo dpkg -i doli-${VERSION}-*.deb"
            echo '```'
            echo ""
            echo "**RHEL / Fedora:**"
            echo '```bash'
            echo "sudo rpm -i doli-${VERSION}-*.rpm"
            echo '```'
            echo ""
            echo "**macOS:**"
            echo '```bash'
            echo "sudo installer -pkg doli-${VERSION}-*.pkg -target /"
            echo '```'
            echo ""
            echo "**From tarball:**"
            echo '```bash'
            echo "tar -xzf doli-${VERSION}-*.tar.gz"
            echo "sudo cp doli-${VERSION}-*/doli-node doli-${VERSION}-*/doli /usr/local/bin/"
            echo '```'
            echo ""
            echo "## Checksums (SHA-256)"
            echo ""
            echo '```'
            cat release/CHECKSUMS.txt
            echo '```'
          } > RELEASE_NOTES.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: RELEASE_NOTES.md
          files: release/*
          draft: false
          prerelease: ${{ contains(github.ref, 'alpha') || contains(github.ref, 'beta') || contains(github.ref, 'rc') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
