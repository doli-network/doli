# DOLI Release Workflow
# Triggers on version tags (v*)
# Builds doli-node + doli (CLI) for 4 platforms, creates native installers, publishes GitHub Release

name: Release

on:
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always

jobs:
  # ── Linux x86_64 ──────────────────────────────────────────────
  build-linux-x64:
    name: Build Linux x86_64
    runs-on: ubuntu-latest
    env:
      TARGET: x86_64-unknown-linux-gnu
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgmp-dev libmpfr-dev librocksdb-dev libclang-dev m4 protobuf-compiler zlib1g-dev

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: x86_64-unknown-linux-gnu

      - name: Build
        run: cargo build --release --target $TARGET --package doli-node --package doli-cli
        env:
          LIBZ_SYS_STATIC: "0"

      - name: Package tarball
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          DIR="doli-${VERSION}-${TARGET}"
          mkdir -p "$DIR"
          cp "target/${TARGET}/release/doli-node" "$DIR/"
          cp "target/${TARGET}/release/doli" "$DIR/"
          cp README.md LICENSE* "$DIR/" 2>/dev/null || true
          tar -czf "${DIR}.tar.gz" "$DIR"

      - name: Build .deb
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          cargo install cargo-deb
          cargo deb -p doli-node --target $TARGET --no-build --no-strip
          DEB_FILE=$(find target/${TARGET}/debian -name '*.deb' | head -1)
          cp "$DEB_FILE" "doli-${VERSION}-${TARGET}.deb"

      - name: Build .rpm
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          cargo install cargo-generate-rpm
          cargo generate-rpm -p bins/node --target $TARGET
          RPM_FILE=$(find target/${TARGET}/generate-rpm -name '*.rpm' | head -1)
          cp "$RPM_FILE" "doli-${VERSION}-${TARGET}.rpm"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-x64
          path: |
            doli-*.tar.gz
            doli-*.deb
            doli-*.rpm

  # ── macOS aarch64 (Apple Silicon) ─────────────────────────────
  build-macos-arm64:
    name: Build macOS aarch64
    runs-on: macos-latest
    env:
      TARGET: aarch64-apple-darwin
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: brew install gmp mpfr protobuf zlib 2>/dev/null || true

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: aarch64-apple-darwin

      - name: Build
        run: cargo build --release --target $TARGET --package doli-node --package doli-cli
        env:
          LIBZ_SYS_STATIC: "0"

      - name: Package tarball
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          DIR="doli-${VERSION}-${TARGET}"
          mkdir -p "$DIR"
          cp "target/${TARGET}/release/doli-node" "$DIR/"
          cp "target/${TARGET}/release/doli" "$DIR/"
          cp README.md LICENSE* "$DIR/" 2>/dev/null || true
          tar -czf "${DIR}.tar.gz" "$DIR"

      - name: Build .pkg
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          VERSION_NUM=${VERSION#v}
          mkdir -p pkg-root/usr/local/bin
          cp "target/${TARGET}/release/doli-node" pkg-root/usr/local/bin/
          cp "target/${TARGET}/release/doli" pkg-root/usr/local/bin/
          pkgbuild --root pkg-root \
            --identifier network.doli.node \
            --version "$VERSION_NUM" \
            --install-location / \
            "doli-${VERSION}-${TARGET}.pkg"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-arm64
          path: |
            doli-*.tar.gz
            doli-*.pkg

  # ── macOS x86_64 REMOVED ─────────────────────────────────────
  # Intel macOS runners (macos-13) retired from GitHub Actions.
  # Apple Silicon builds run x86_64 binaries via Rosetta 2.
  # Users on Intel Macs should use the aarch64 .pkg (works via Rosetta).

  # ── GUI: Linux x86_64 (.AppImage, .deb) ──────────────────────
  build-gui-linux:
    name: Build GUI Linux x86_64
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgmp-dev libmpfr-dev librocksdb-dev libclang-dev m4 protobuf-compiler zlib1g-dev \
            libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev patchelf

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: gui-linux-x64

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2"

      - name: Build frontend
        working-directory: bins/gui/src-ui
        run: npm install && npm run build

      - name: Sync tauri.conf.json version from tag
        run: |
          VERSION_NUM=${GITHUB_REF#refs/tags/v}
          cd bins/gui
          sed -i "s/\"version\": \".*\"/\"version\": \"${VERSION_NUM}\"/" tauri.conf.json
          echo "Set tauri.conf.json version to ${VERSION_NUM}"

      - name: Build GUI
        working-directory: bins/gui
        run: cargo tauri build
        env:
          LIBZ_SYS_STATIC: "0"

      - name: Collect artifacts
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          mkdir -p gui-artifacts
          find target/release/bundle -name '*.AppImage' -exec cp {} gui-artifacts/ \; 2>/dev/null || true
          find target/release/bundle -name '*.deb' -exec cp {} gui-artifacts/ \; 2>/dev/null || true

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: gui-linux
          path: gui-artifacts/*

  # ── GUI: macOS (.dmg) ───────────────────────────────────────
  build-gui-macos:
    name: Build GUI macOS
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: brew install gmp mpfr protobuf zlib 2>/dev/null || true

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: gui-macos-arm64

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2"

      - name: Build frontend
        working-directory: bins/gui/src-ui
        run: npm install && npm run build

      - name: Sync tauri.conf.json version from tag
        run: |
          VERSION_NUM=${GITHUB_REF#refs/tags/v}
          cd bins/gui
          sed -i '' "s/\"version\": \".*\"/\"version\": \"${VERSION_NUM}\"/" tauri.conf.json
          echo "Set tauri.conf.json version to ${VERSION_NUM}"

      - name: Build GUI
        working-directory: bins/gui
        run: cargo tauri build
        env:
          LIBZ_SYS_STATIC: "0"

      - name: Collect artifacts
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          mkdir -p gui-artifacts
          find target/release/bundle -name '*.dmg' -exec cp {} gui-artifacts/ \; 2>/dev/null || true

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: gui-macos
          path: gui-artifacts/*

  # ── GUI: Windows (.msi) ─────────────────────────────────────
  build-gui-windows:
    name: Build GUI Windows
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install MSYS2 dependencies
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          install: mingw-w64-x86_64-gmp mingw-w64-x86_64-mpfr

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: gui-windows-x64

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2"

      - name: Build frontend
        working-directory: bins/gui/src-ui
        run: npm install && npm run build

      - name: Sync tauri.conf.json version from tag
        run: |
          $VersionNum = "${{ github.ref_name }}".TrimStart("v")
          $conf = Get-Content bins/gui/tauri.conf.json -Raw
          $conf = $conf -replace '"version": ".*?"', "`"version`": `"$VersionNum`""
          Set-Content bins/gui/tauri.conf.json $conf
          Write-Host "Set tauri.conf.json version to $VersionNum"
        shell: pwsh

      - name: Build GUI
        working-directory: bins/gui
        run: cargo tauri build

      - name: Collect artifacts
        run: |
          mkdir gui-artifacts
          Get-ChildItem -Recurse -Path target\release\bundle -Include *.msi | Copy-Item -Destination gui-artifacts\
          Get-ChildItem -Recurse -Path target\release\bundle -Include *.exe | Where-Object { $_.Name -match 'setup|installer' } | Copy-Item -Destination gui-artifacts\
        shell: pwsh

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: gui-windows
          path: gui-artifacts/*

  # ── Create GitHub Release ─────────────────────────────────────
  release:
    name: Create Release
    needs: [build-linux-x64, build-macos-arm64, build-gui-linux, build-gui-macos, build-gui-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Flatten artifacts
        run: |
          mkdir -p release
          find artifacts -type f \( -name "*.tar.gz" -o -name "*.deb" -o -name "*.rpm" -o -name "*.pkg" -o -name "*.AppImage" -o -name "*.dmg" -o -name "*.msi" -o -name "*.exe" \) -exec mv {} release/ \;

      - name: Generate checksums
        run: |
          cd release
          sha256sum * > CHECKSUMS.txt

      - name: Create empty SIGNATURES.json scaffold
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          VERSION_NUM=${VERSION#v}
          CHECKSUMS_SHA256=$(sha256sum release/CHECKSUMS.txt | cut -d' ' -f1)
          cat > release/SIGNATURES.json <<SIGEOF
          {
            "version": "${VERSION_NUM}",
            "checksums_sha256": "${CHECKSUMS_SHA256}",
            "signatures": []
          }
          SIGEOF

      - name: Generate release notes
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")

          {
            echo "## What's Changed"
            echo ""

            if [ -n "$PREV_TAG" ]; then
              git log "${PREV_TAG}..HEAD" --pretty=format:"* %s"
            else
              git log --pretty=format:"* %s" -20
            fi

            echo ""
            echo ""
            echo "## Downloads"
            echo ""
            echo "### Node + CLI"
            echo ""
            echo "Each archive contains both \`doli-node\` (full node) and \`doli\` (wallet CLI)."
            echo ""
            echo "| Platform | File |"
            echo "|----------|------|"

            for f in release/*.tar.gz release/*.deb release/*.rpm release/*.pkg; do
              [ -f "$f" ] && echo "| $(basename "${f%.*}" | sed "s/doli-${VERSION}-//") | $(basename "$f") |"
            done

            echo ""
            echo "### Desktop Wallet (GUI)"
            echo ""
            echo "| Platform | File |"
            echo "|----------|------|"

            for f in release/*.AppImage release/*.dmg release/*.msi release/*.exe; do
              [ -f "$f" ] && echo "| $(basename "${f%.*}") | $(basename "$f") |"
            done

            echo ""
            echo "## Installation"
            echo ""
            echo "**Debian / Ubuntu:**"
            echo '```bash'
            echo "sudo dpkg -i doli-${VERSION}-*.deb"
            echo '```'
            echo ""
            echo "**RHEL / Fedora:**"
            echo '```bash'
            echo "sudo rpm -i doli-${VERSION}-*.rpm"
            echo '```'
            echo ""
            echo "**macOS:**"
            echo '```bash'
            echo "sudo installer -pkg doli-${VERSION}-*.pkg -target /"
            echo '```'
            echo ""
            echo "**From tarball:**"
            echo '```bash'
            echo "tar -xzf doli-${VERSION}-*.tar.gz"
            echo "sudo cp doli-${VERSION}-*/doli-node doli-${VERSION}-*/doli /usr/local/bin/"
            echo '```'
            echo ""
            echo "## Checksums (SHA-256)"
            echo ""
            echo '```'
            cat release/CHECKSUMS.txt
            echo '```'
          } > RELEASE_NOTES.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: RELEASE_NOTES.md
          files: release/*
          draft: false
          prerelease: ${{ contains(github.ref, 'alpha') || contains(github.ref, 'beta') || contains(github.ref, 'rc') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
