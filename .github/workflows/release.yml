# Release Workflow
# Triggers on version tags (v*) and builds release binaries for all platforms
# Creates GitHub Release with artifacts and checksums

name: Release

on:
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always

jobs:
  # ==========================================================================
  # Create Release (runs first to get upload URL)
  # ==========================================================================
  create-release:
    name: Create Release
    runs-on: ubuntu-latest
    outputs:
      upload_url: ${{ steps.create_release.outputs.upload_url }}
      version: ${{ steps.get_version.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get version
        id: get_version
        run: echo "version=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Generate release notes
        id: release_notes
        run: |
          # Get commits since last tag
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -n "$PREV_TAG" ]; then
            NOTES=$(git log --pretty=format:"- %s (%h)" ${PREV_TAG}..HEAD)
          else
            NOTES=$(git log --pretty=format:"- %s (%h)" -20)
          fi

          # Create release notes file
          cat > release_notes.md << EOF
          ## What's Changed

          ${NOTES}

          ## Installation

          ### Pre-built Binary (Recommended)

          \`\`\`bash
          # Download and install
          curl -L https://github.com/e-weil/doli/releases/download/${{ steps.get_version.outputs.version }}/doli-${{ steps.get_version.outputs.version }}-x86_64-unknown-linux-musl.tar.gz | tar xz
          sudo mv doli-node doli /usr/local/bin/

          # Verify installation
          doli-node --version
          \`\`\`

          ### Docker

          \`\`\`bash
          docker pull ghcr.io/e-weil/doli-node:${{ steps.get_version.outputs.version }}
          docker run -d -p 30303:30303 -p 8545:8545 ghcr.io/e-weil/doli-node:${{ steps.get_version.outputs.version }}
          \`\`\`

          ### Verify Checksums

          \`\`\`bash
          sha256sum -c doli-${{ steps.get_version.outputs.version }}-x86_64-unknown-linux-musl.tar.gz.sha256
          \`\`\`

          ## Full Changelog

          https://github.com/e-weil/doli/compare/${PREV_TAG}...${{ steps.get_version.outputs.version }}
          EOF

      - name: Create Release
        id: create_release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.get_version.outputs.version }}
          name: DOLI ${{ steps.get_version.outputs.version }}
          body_path: release_notes.md
          draft: false
          prerelease: ${{ contains(steps.get_version.outputs.version, '-') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ==========================================================================
  # Build Linux Binaries
  # ==========================================================================
  build-linux:
    name: Build Linux (${{ matrix.target }})
    needs: create-release
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            artifact_name: doli-${{ needs.create-release.outputs.version }}-x86_64-unknown-linux-gnu
          - target: x86_64-unknown-linux-musl
            artifact_name: doli-${{ needs.create-release.outputs.version }}-x86_64-unknown-linux-musl
            use_cross: true
          - target: aarch64-unknown-linux-gnu
            artifact_name: doli-${{ needs.create-release.outputs.version }}-aarch64-unknown-linux-gnu
            use_cross: true
          - target: aarch64-unknown-linux-musl
            artifact_name: doli-${{ needs.create-release.outputs.version }}-aarch64-unknown-linux-musl
            use_cross: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system dependencies
        if: ${{ !matrix.use_cross }}
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config \
            libgmp-dev \
            librocksdb-dev \
            libssl-dev \
            libclang-dev \
            protobuf-compiler

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross
        if: ${{ matrix.use_cross }}
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.target }}-cargo-registry-

      - name: Build with cargo
        if: ${{ !matrix.use_cross }}
        run: |
          cargo build --release --target ${{ matrix.target }} -p doli-node
          cargo build --release --target ${{ matrix.target }} -p doli-cli

      - name: Build with cross
        if: ${{ matrix.use_cross }}
        run: |
          cross build --release --target ${{ matrix.target }} -p doli-node
          cross build --release --target ${{ matrix.target }} -p doli-cli

      - name: Package
        run: |
          mkdir -p release
          cp target/${{ matrix.target }}/release/doli-node release/
          cp target/${{ matrix.target }}/release/doli release/ || true

          # Create README
          cat > release/README.txt << EOF
          DOLI Node ${{ needs.create-release.outputs.version }}
          Target: ${{ matrix.target }}

          Quick Start:
            ./doli-node run

          Documentation:
            https://github.com/e-weil/doli/blob/main/docs/RUNNING_A_NODE.md
          EOF

          # Create tarball
          cd release
          tar -czf ../${{ matrix.artifact_name }}.tar.gz *
          cd ..

          # Generate checksums
          sha256sum ${{ matrix.artifact_name }}.tar.gz > ${{ matrix.artifact_name }}.tar.gz.sha256

      - name: Upload tarball
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ needs.create-release.outputs.version }}
          files: ${{ matrix.artifact_name }}.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload checksum
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ needs.create-release.outputs.version }}
          files: ${{ matrix.artifact_name }}.tar.gz.sha256
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ==========================================================================
  # Build macOS Binaries
  # ==========================================================================
  build-macos:
    name: Build macOS (${{ matrix.target }})
    needs: create-release
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-apple-darwin
            os: macos-13
            artifact_name: doli-${{ needs.create-release.outputs.version }}-x86_64-apple-darwin
          - target: aarch64-apple-darwin
            os: macos-14
            artifact_name: doli-${{ needs.create-release.outputs.version }}-aarch64-apple-darwin

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          brew install gmp rocksdb openssl@3 protobuf

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.target }}-cargo-registry-

      - name: Build
        run: |
          cargo build --release --target ${{ matrix.target }} -p doli-node
          cargo build --release --target ${{ matrix.target }} -p doli-cli
        env:
          OPENSSL_DIR: /opt/homebrew/opt/openssl@3
          ROCKSDB_LIB_DIR: /opt/homebrew/lib
          GMP_LIB_DIR: /opt/homebrew/lib

      - name: Package
        run: |
          mkdir -p release
          cp target/${{ matrix.target }}/release/doli-node release/
          cp target/${{ matrix.target }}/release/doli release/ || true

          # Create README
          cat > release/README.txt << EOF
          DOLI Node ${{ needs.create-release.outputs.version }}
          Target: ${{ matrix.target }}

          Quick Start:
            ./doli-node run

          Documentation:
            https://github.com/e-weil/doli/blob/main/docs/RUNNING_A_NODE.md
          EOF

          # Create tarball
          cd release
          tar -czf ../${{ matrix.artifact_name }}.tar.gz *
          cd ..

          # Generate checksums
          shasum -a 256 ${{ matrix.artifact_name }}.tar.gz > ${{ matrix.artifact_name }}.tar.gz.sha256

      - name: Upload tarball
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ needs.create-release.outputs.version }}
          files: ${{ matrix.artifact_name }}.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload checksum
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ needs.create-release.outputs.version }}
          files: ${{ matrix.artifact_name }}.tar.gz.sha256
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ==========================================================================
  # Smoke Test Linux Binaries
  # ==========================================================================
  smoke-test-linux:
    name: Smoke Test Linux (${{ matrix.target }})
    needs: [create-release, build-linux]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            artifact_name: doli-${{ needs.create-release.outputs.version }}-x86_64-unknown-linux-gnu
          - target: x86_64-unknown-linux-musl
            artifact_name: doli-${{ needs.create-release.outputs.version }}-x86_64-unknown-linux-musl

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install test dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y curl netcat-openbsd

      - name: Download release artifact
        run: |
          gh release download ${{ needs.create-release.outputs.version }} \
            --pattern '${{ matrix.artifact_name }}.tar.gz' \
            --pattern '${{ matrix.artifact_name }}.tar.gz.sha256' \
            --dir .
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract binary
        run: |
          mkdir -p release
          tar -xzf ${{ matrix.artifact_name }}.tar.gz -C release

      - name: Run smoke test
        run: |
          chmod +x scripts/smoke_test_release.sh
          ./scripts/smoke_test_release.sh --binary release/doli-node --timeout 90

  # ==========================================================================
  # Smoke Test macOS Binaries
  # ==========================================================================
  smoke-test-macos:
    name: Smoke Test macOS (${{ matrix.target }})
    needs: [create-release, build-macos]
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-apple-darwin
            os: macos-13
            artifact_name: doli-${{ needs.create-release.outputs.version }}-x86_64-apple-darwin
          - target: aarch64-apple-darwin
            os: macos-14
            artifact_name: doli-${{ needs.create-release.outputs.version }}-aarch64-apple-darwin

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download release artifact
        run: |
          gh release download ${{ needs.create-release.outputs.version }} \
            --pattern '${{ matrix.artifact_name }}.tar.gz' \
            --pattern '${{ matrix.artifact_name }}.tar.gz.sha256' \
            --dir .
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract binary
        run: |
          mkdir -p release
          tar -xzf ${{ matrix.artifact_name }}.tar.gz -C release

      - name: Run smoke test
        run: |
          chmod +x scripts/smoke_test_release.sh
          ./scripts/smoke_test_release.sh --binary release/doli-node --timeout 90

  # ==========================================================================
  # Smoke Test Docker Image
  # ==========================================================================
  smoke-test-docker:
    name: Smoke Test Docker
    needs: [create-release, build-linux]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          load: true
          tags: doli-node:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run Docker smoke test
        run: |
          # Start container
          CONTAINER_ID=$(docker run -d \
            -e DOLI_NETWORK=devnet \
            -e DOLI_LOG_LEVEL=warn \
            -p 50303:50303 \
            -p 28545:28545 \
            doli-node:test)

          echo "Container started: $CONTAINER_ID"

          # Wait for container to be healthy
          MAX_WAIT=90
          WAITED=0
          while [ $WAITED -lt $MAX_WAIT ]; do
            STATUS=$(docker inspect --format='{{.State.Health.Status}}' $CONTAINER_ID 2>/dev/null || echo "starting")

            if [ "$STATUS" = "healthy" ]; then
              echo "Container is healthy"
              break
            fi

            if [ "$STATUS" = "unhealthy" ]; then
              echo "Container is unhealthy"
              docker logs $CONTAINER_ID
              docker stop $CONTAINER_ID
              exit 1
            fi

            # Check if container is still running
            if ! docker ps -q --filter "id=$CONTAINER_ID" | grep -q .; then
              echo "Container stopped unexpectedly"
              docker logs $CONTAINER_ID
              exit 1
            fi

            sleep 2
            WAITED=$((WAITED + 2))
          done

          if [ $WAITED -ge $MAX_WAIT ]; then
            echo "Timeout waiting for container to be healthy"
            docker logs $CONTAINER_ID
            docker stop $CONTAINER_ID
            exit 1
          fi

          # Test RPC endpoint
          echo "Testing RPC endpoint..."
          RESPONSE=$(curl -sf -X POST http://localhost:28545 \
            -H "Content-Type: application/json" \
            -d '{"jsonrpc":"2.0","method":"getNodeInfo","params":[],"id":1}' || echo '{}')

          if echo "$RESPONSE" | grep -q '"result"'; then
            echo "RPC test passed"
            echo "$RESPONSE" | head -c 500
          else
            echo "RPC test failed"
            echo "$RESPONSE"
            docker logs $CONTAINER_ID
            docker stop $CONTAINER_ID
            exit 1
          fi

          # Cleanup
          docker stop $CONTAINER_ID
          echo "Docker smoke test passed"

  # ==========================================================================
  # Create Combined Checksums File
  # ==========================================================================
  checksums:
    name: Create Checksums
    needs: [create-release, build-linux, build-macos, smoke-test-linux, smoke-test-macos, smoke-test-docker]
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Download release assets
        run: |
          gh release download ${{ needs.create-release.outputs.version }} \
            --pattern '*.sha256' \
            --dir checksums
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}

      - name: Create combined checksums file
        run: |
          cat checksums/*.sha256 > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - name: Upload combined checksums
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ needs.create-release.outputs.version }}
          files: SHA256SUMS.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
