# Logrotate config for local testnet nodes
# Run via user cron: logrotate --state ~/.local/state/logrotate.status testnetlinux/logrotate.conf

/home/ilozada/repos/localdoli/testnetlinux/logs/*.log {
    daily
    rotate 7
    maxsize 100M
    missingok
    notifempty
    compress
    delaycompress
    copytruncate
}
