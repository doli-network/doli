# Cross compilation configuration for DOLI
# https://github.com/cross-rs/cross

[build.env]
passthrough = [
    "RUST_BACKTRACE",
    "RUST_LOG",
]

# =============================================================================
# x86_64-unknown-linux-musl - Fully static Linux binary
# =============================================================================
[target.x86_64-unknown-linux-musl]
# Use custom Docker image with all dependencies pre-built for static linking
image = "ghcr.io/e-weil/doli-cross:x86_64-musl"

# Pre-build script to ensure static libraries are available
pre-build = [
    "apt-get update && apt-get install -y musl-tools",
]

[target.x86_64-unknown-linux-musl.env]
passthrough = [
    "OPENSSL_STATIC=1",
    "OPENSSL_LIB_DIR=/musl/lib",
    "OPENSSL_INCLUDE_DIR=/musl/include",
    "ROCKSDB_STATIC=1",
    "ROCKSDB_LIB_DIR=/musl/lib",
    "GMP_STATIC=1",
    "GMP_LIB_DIR=/musl/lib",
    "PKG_CONFIG_ALLOW_CROSS=1",
    "PKG_CONFIG_ALL_STATIC=1",
]

# =============================================================================
# aarch64-unknown-linux-musl - ARM64 static Linux binary
# =============================================================================
[target.aarch64-unknown-linux-musl]
image = "ghcr.io/e-weil/doli-cross:aarch64-musl"

[target.aarch64-unknown-linux-musl.env]
passthrough = [
    "OPENSSL_STATIC=1",
    "OPENSSL_LIB_DIR=/musl/lib",
    "OPENSSL_INCLUDE_DIR=/musl/include",
    "ROCKSDB_STATIC=1",
    "ROCKSDB_LIB_DIR=/musl/lib",
    "GMP_STATIC=1",
    "GMP_LIB_DIR=/musl/lib",
    "PKG_CONFIG_ALLOW_CROSS=1",
    "PKG_CONFIG_ALL_STATIC=1",
]

# =============================================================================
# x86_64-unknown-linux-gnu - Standard Linux binary (dynamically linked)
# =============================================================================
[target.x86_64-unknown-linux-gnu]
# Default cross image works fine for gnu target

[target.x86_64-unknown-linux-gnu.env]
passthrough = [
    "ROCKSDB_LIB_DIR=/usr/lib/x86_64-linux-gnu",
]

# =============================================================================
# aarch64-unknown-linux-gnu - ARM64 Linux binary (dynamically linked)
# =============================================================================
[target.aarch64-unknown-linux-gnu]

[target.aarch64-unknown-linux-gnu.env]
passthrough = [
    "ROCKSDB_LIB_DIR=/usr/lib/aarch64-linux-gnu",
]
